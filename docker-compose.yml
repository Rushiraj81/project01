version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: eldercare-postgres
    environment:
      POSTGRES_DB: eldercare
      POSTGRES_USER: eldercare_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - eldercare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eldercare_user -d eldercare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eldercare-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eldercare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: eldercare-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: eldercare
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - eldercare-network
    restart: unless-stopped

  # Message Broker
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: eldercare-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./iot-sensors/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - eldercare-network
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eldercare-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://eldercare_user:${POSTGRES_PASSWORD}@postgres:5432/eldercare
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MQTT_BROKER_URL: mqtt://mqtt:1883
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - eldercare-network
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web Dashboard
  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: eldercare-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - eldercare-network
    restart: unless-stopped

  # IoT Gateway
  iot-gateway:
    build:
      context: ./iot-sensors
      dockerfile: Dockerfile.gateway
    container_name: eldercare-iot-gateway
    environment:
      MQTT_BROKER: mqtt://mqtt:1883
      CLOUD_ENDPOINT: ws://api:4000/iot
      API_KEY: ${IOT_GATEWAY_API_KEY}
      DEVICE_ID: gateway-001
      ENCRYPTION_KEY: ${IOT_ENCRYPTION_KEY}
    depends_on:
      - mqtt
      - api
    networks:
      - eldercare-network
    restart: unless-stopped
    volumes:
      - iot_data:/app/data

  # AI/ML Services
  ml-processor:
    build:
      context: ./ml-services
      dockerfile: Dockerfile
    container_name: eldercare-ml
    environment:
      DATABASE_URL: postgresql://eldercare_user:${POSTGRES_PASSWORD}@postgres:5432/eldercare
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      MODEL_PATH: /app/models
    depends_on:
      - postgres
      - redis
      - influxdb
    networks:
      - eldercare-network
    restart: unless-stopped
    volumes:
      - ml_models:/app/models
      - ml_data:/app/data

  # Monitoring and Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: eldercare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - eldercare-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: eldercare-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - eldercare-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: eldercare-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - web-dashboard
      - api
    networks:
      - eldercare-network
    restart: unless-stopped

  # Data Backup Service
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: eldercare-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: eldercare
      POSTGRES_USER: eldercare_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 2 AM
      BACKUP_RETENTION_DAYS: 30
      S3_BUCKET: ${BACKUP_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - backup_data:/backup
    depends_on:
      - postgres
    networks:
      - eldercare-network
    restart: unless-stopped

networks:
  eldercare-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  influxdb_data:
    driver: local
  mqtt_data:
    driver: local
  mqtt_logs:
    driver: local
  iot_data:
    driver: local
  ml_models:
    driver: local
  ml_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
  backup_data:
    driver: local